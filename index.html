<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARISE — Fitness Hunter System</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%230d1220' width='32' height='32'/><text y='22' x='6' font-size='16' fill='%234a7cff'>A</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080e;--bg2:#0b0f1a;--panel:#0d1220;--panel2:#111833;--border:#1a2444;--border-glow:#2a3a6a;--text:#c8d6f0;--text-dim:#4a5a80;--text-bright:#eef2ff;--blue:#4a7cff;--blue-glow:#4a7cff55;--purple:#8b5cf6;--purple-glow:#8b5cf655;--cyan:#22d3ee;--cyan-glow:#22d3ee44;--red:#ef4444;--red-glow:#ef444444;--gold:#fbbf24;--gold-glow:#fbbf2444;--green:#22c55e;--rank-e:#6b7280;--rank-d:#22c55e;--rank-c:#3b82f6;--rank-b:#8b5cf6;--rank-a:#f59e0b;--rank-s:#ef4444;--rank-ss:#ec4899;--rank-sss:#fbbf24}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Chakra Petch',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:float var(--dur) ease-in-out infinite;opacity:0}
@keyframes float{0%{opacity:0;transform:translateY(0) scale(.5)}20%{opacity:var(--op)}80%{opacity:var(--op)}100%{opacity:0;transform:translateY(calc(var(--drift)*-1)) scale(0)}}

#systemNotif{position:fixed;top:-100px;left:50%;transform:translateX(-50%);z-index:999;padding:16px 32px;background:linear-gradient(135deg,rgba(74,124,255,.15),rgba(139,92,246,.15));border:1px solid var(--blue);border-radius:2px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;text-align:center;box-shadow:0 0 40px var(--blue-glow);transition:top .5s cubic-bezier(.22,1,.36,1);max-width:90vw}
#systemNotif.show{top:20px}
#systemNotif::before{content:'[ SYSTEM ]';display:block;font-size:9px;color:var(--blue);margin-bottom:4px;letter-spacing:4px}

/* ─── ICON SYSTEM (no emoji) ─── */
.ico{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:2px;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;flex-shrink:0}
.ico-str{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.ico-end{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.ico-agi{background:rgba(251,191,36,.15);color:var(--gold);border:1px solid rgba(251,191,36,.3)}
.ico-vit{background:rgba(236,72,153,.15);color:#ec4899;border:1px solid rgba(236,72,153,.3)}
.ico-men{background:rgba(139,92,246,.15);color:var(--purple);border:1px solid rgba(139,92,246,.3)}
.ico-lg{width:28px;height:28px;font-size:11px}
.ico-xp{background:rgba(74,124,255,.15);color:var(--blue);border:1px solid rgba(74,124,255,.3)}
.ico-quest{background:rgba(34,211,238,.15);color:var(--cyan);border:1px solid rgba(34,211,238,.3)}
.ico-sword{background:rgba(74,124,255,.1);color:var(--blue);border:1px solid rgba(74,124,255,.2)}

.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:center;gap:4px;padding:8px 12px;background:rgba(6,8,14,.95);backdrop-filter:blur(16px);border-top:1px solid var(--border)}
.nav-btn{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);background:0 0;border:1px solid transparent;padding:10px 14px;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;gap:4px;border-radius:4px;min-width:60px}
.nav-btn .nav-ico{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900}
.nav-btn:hover{color:var(--blue)}
.nav-btn.active{color:var(--cyan);background:rgba(34,211,238,.05);border-color:rgba(34,211,238,.2);box-shadow:0 0 16px var(--cyan-glow)}

.page{display:none;padding:20px 16px 100px;max-width:600px;margin:0 auto;min-height:100vh;position:relative;z-index:1;animation:pageIn .4s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.profile-header{position:relative;padding:24px;margin-bottom:20px;background:linear-gradient(145deg,var(--panel),var(--bg2));border:1px solid var(--border);border-radius:4px;overflow:hidden}
.profile-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--purple),var(--cyan))}
.profile-header::after{content:'';position:absolute;top:-50%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,var(--blue-glow) 0%,transparent 70%);pointer-events:none}
.profile-rank-badge{position:absolute;top:16px;right:16px;font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;opacity:.12;letter-spacing:-2px}
.profile-name-row{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.profile-avatar{width:52px;height:52px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;border:2px solid var(--border);background:var(--bg);color:var(--blue)}
.profile-name{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:var(--text-bright)}
.profile-title{font-size:12px;color:var(--text-dim);letter-spacing:1px}
.profile-rank-line{display:flex;align-items:center;gap:8px;margin:16px 0 12px}
.rank-label{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:2px;border:1px solid}
.profile-level{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:600;color:var(--text-dim)}
.xp-bar-wrap{margin-top:8px}
.xp-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-bottom:4px;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1px}
.xp-track{height:8px;background:var(--bg);border-radius:2px;overflow:hidden;border:1px solid var(--border)}
.xp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .8s cubic-bezier(.22,1,.36,1);position:relative}
.xp-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:20px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3));animation:xpShine 2s ease infinite}
@keyframes xpShine{0%,100%{opacity:0}50%{opacity:1}}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.stat-card{padding:14px 12px;background:var(--panel);border:1px solid var(--border);border-radius:4px;text-align:center;transition:all .3s}
.stat-card:hover{border-color:var(--border-glow)}
.stat-value{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:800;color:var(--text-bright);line-height:1;margin-bottom:4px}
.stat-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}

.abilities{margin-bottom:20px;padding:20px;background:var(--panel);border:1px solid var(--border);border-radius:4px}
.abilities-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--blue);margin-bottom:16px;text-transform:uppercase}
.ability-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ability-name{font-size:11px;font-weight:600;color:var(--text);width:70px;letter-spacing:.5px}
.ability-track{flex:1;height:6px;background:var(--bg);border-radius:2px;overflow:hidden}
.ability-fill{height:100%;border-radius:2px;transition:width 1s ease}
.ability-val{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;width:28px;text-align:right}

.section-head{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.section-head h2{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;color:var(--text-bright);text-transform:uppercase}
.section-head .line{flex:1;height:1px;background:linear-gradient(90deg,var(--border-glow),transparent)}

.quest-card{padding:16px;margin-bottom:10px;background:var(--panel);border:1px solid var(--border);border-radius:4px;transition:all .3s;position:relative;overflow:hidden}
.quest-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.quest-card.daily::before{background:var(--cyan)}.quest-card.weekly::before{background:var(--purple)}.quest-card.boss::before{background:var(--red)}
.quest-card:hover{border-color:var(--border-glow);transform:translateX(4px)}
.quest-card.completed{opacity:.4;border-color:var(--green)}
.quest-card.completed .quest-done-tag{position:absolute;top:8px;right:8px;font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;color:var(--green);letter-spacing:2px}
.quest-type{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.quest-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--text-bright);margin-bottom:4px}
.quest-desc{font-size:12px;color:var(--text-dim);margin-bottom:10px;line-height:1.5}
.quest-rewards{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.quest-reward{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:600;padding:3px 8px;border-radius:2px;display:flex;align-items:center;gap:4px}
.quest-reward.xp-r{background:rgba(74,124,255,.1);border:1px solid rgba(74,124,255,.2);color:var(--cyan)}
.quest-reward.str-r{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red)}
.quest-reward.end-r{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:var(--green)}
.quest-reward.agi-r{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);color:var(--gold)}
.quest-reward.vit-r{background:rgba(236,72,153,.08);border:1px solid rgba(236,72,153,.2);color:#ec4899}
.quest-reward.men-r{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);color:var(--purple)}
.quest-progress{display:flex;align-items:center;gap:8px}
.quest-prog-track{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.quest-prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:2px;transition:width .5s ease}
.quest-prog-text{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;color:var(--text-dim);min-width:40px;text-align:right}
.quest-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.quest-btn{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;border:1px solid var(--blue);background:rgba(74,124,255,.1);color:var(--blue);cursor:pointer;border-radius:2px;transition:all .2s}
.quest-btn:hover{background:var(--blue);color:var(--bg);box-shadow:0 0 20px var(--blue-glow)}
.quest-btn.complete-btn{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.1)}
.quest-btn.complete-btn:hover{background:var(--green);color:var(--bg);box-shadow:0 0 20px rgba(34,197,94,.4)}
.quest-ready{animation:readyPulse 2s ease infinite}
@keyframes readyPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 20px var(--blue-glow)}}

.clan-banner{padding:24px;background:linear-gradient(145deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:4px;margin-bottom:16px;position:relative;overflow:hidden}
.clan-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.clan-banner.shadow::before{background:linear-gradient(90deg,#8b5cf6,#6d28d9)}.clan-banner.flame::before{background:linear-gradient(90deg,#ef4444,#f59e0b)}.clan-banner.frost::before{background:linear-gradient(90deg,#22d3ee,#3b82f6)}.clan-banner.void::before{background:linear-gradient(90deg,#6366f1,#ec4899)}
.clan-name{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:800;color:var(--text-bright);margin-bottom:4px}
.clan-motto{font-size:12px;font-style:italic;color:var(--text-dim);margin-bottom:12px}
.clan-stats{display:flex;gap:16px}
.clan-stat-val{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:800;color:var(--text-bright)}
.clan-stat-label{font-size:9px;font-weight:600;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase}
.clan-member{display:flex;align-items:center;gap:12px;padding:12px;margin-bottom:6px;background:var(--panel);border:1px solid var(--border);border-radius:4px}
.clan-member-avatar{width:36px;height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;background:var(--bg);border:1px solid var(--border);color:var(--text-dim)}
.clan-member-info{flex:1}
.clan-member-name{font-weight:700;font-size:13px;color:var(--text-bright)}
.clan-member-role{font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
.clan-member-rank{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:800}

.lb-entry{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:6px;background:var(--panel);border:1px solid var(--border);border-radius:4px;transition:all .3s}
.lb-entry:hover{border-color:var(--border-glow)}
.lb-entry.you{border-color:var(--blue);background:rgba(74,124,255,.05)}
.lb-entry.top1{border-color:var(--gold);background:rgba(251,191,36,.05)}
.lb-entry.top2{border-color:#94a3b8;background:rgba(148,163,184,.03)}
.lb-entry.top3{border-color:#b45309;background:rgba(180,83,9,.03)}
.lb-pos{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;width:32px;text-align:center;color:var(--text-dim)}
.lb-entry.top1 .lb-pos{color:var(--gold)}.lb-entry.top2 .lb-pos{color:#94a3b8}.lb-entry.top3 .lb-pos{color:#b45309}
.lb-avatar{width:36px;height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;background:var(--bg);border:1px solid var(--border);color:var(--text-dim)}
.lb-info{flex:1}.lb-name{font-weight:700;font-size:13px;color:var(--text-bright)}.lb-clan{font-size:10px;color:var(--text-dim)}
.lb-score{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:800;color:var(--cyan)}
.lb-rank{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:800;padding:2px 8px;border-radius:2px;border:1px solid}

.rank-e{color:var(--rank-e);border-color:var(--rank-e)}.rank-d{color:var(--rank-d);border-color:var(--rank-d)}.rank-c{color:var(--rank-c);border-color:var(--rank-c)}.rank-b{color:var(--rank-b);border-color:var(--rank-b)}.rank-a{color:var(--rank-a);border-color:var(--rank-a)}.rank-s{color:var(--rank-s);border-color:var(--rank-s)}.rank-ss{color:var(--rank-ss);border-color:var(--rank-ss)}.rank-sss{color:var(--rank-sss);border-color:var(--rank-sss);text-shadow:0 0 10px var(--gold-glow)}

.log-entry{padding:10px 14px;margin-bottom:4px;background:var(--panel);border-left:2px solid var(--border);font-size:12px;color:var(--text-dim);border-radius:0 4px 4px 0}
.log-entry .time{font-family:'Orbitron',sans-serif;font-size:9px;opacity:.5}
.log-entry.xp{border-left-color:var(--blue)}.log-entry.quest{border-left-color:var(--cyan)}.log-entry.rank{border-left-color:var(--gold)}

.modal-overlay{position:fixed;inset:0;background:rgba(6,8,14,.9);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:28px;width:100%;max-width:420px;animation:slideUp .3s ease}
.modal h3{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--text-bright);margin-bottom:16px;letter-spacing:2px}
.modal-input{width:100%;font-family:'Chakra Petch',sans-serif;font-size:14px;padding:10px 14px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);outline:none;margin-bottom:12px}
.modal-input:focus{border-color:var(--blue)}
.mbtn{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px 20px;border-radius:2px;border:none;cursor:pointer;transition:all .2s}
.mbtn-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff}
.mbtn-primary:hover{box-shadow:0 0 24px var(--blue-glow)}

#levelUpOverlay,#rankUpOverlay{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(6,8,14,.95)}
#levelUpOverlay.show,#rankUpOverlay.show{display:flex;animation:fadeIn .3s ease}
.lvl-up-text{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:6px;color:var(--blue);margin-bottom:12px;animation:pulse 1s ease infinite}
.lvl-up-number{font-family:'Orbitron',sans-serif;font-size:72px;font-weight:900;background:linear-gradient(180deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px var(--blue-glow));animation:scaleIn .5s cubic-bezier(.22,1,.36,1)}
.lvl-up-sub{font-size:14px;color:var(--text-dim);margin-top:8px}
.rank-up-label{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:6px;color:var(--gold);margin-bottom:8px}
.rank-up-letter{font-family:'Orbitron',sans-serif;font-size:96px;font-weight:900;animation:scaleIn .6s cubic-bezier(.22,1,.36,1)}

@keyframes scaleIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:400px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="particles"></div>
<div id="systemNotif"></div>
<div id="levelUpOverlay"><p class="lvl-up-text">LEVEL UP</p><p class="lvl-up-number" id="lvlUpNum"></p><p class="lvl-up-sub">Le pouvoir grandit en toi...</p></div>
<div id="rankUpOverlay"><p class="rank-up-label">RANK PROMOTION</p><p class="rank-up-letter" id="rankUpLetter"></p></div>

<div class="page active" id="pageDashboard"></div>
<div class="page" id="pageQuests"></div>
<div class="page" id="pageClan"></div>
<div class="page" id="pageLeaderboard"></div>
<div class="page" id="pageLog"></div>

<div class="modal-overlay" id="setupModal">
  <div class="modal">
    <h3>ARISE, HUNTER</h3>
    <p style="color:var(--text-dim);margin-bottom:16px;font-size:13px;">Choisis ton nom de chasseur.</p>
    <input class="modal-input" id="setupName" placeholder="Nom du Hunter..." maxlength="20" onkeydown="if(event.key==='Enter')finishSetup()">
    <button class="mbtn mbtn-primary" onclick="finishSetup()" style="margin-top:8px">ARISE</button>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('Dashboard',this)"><span class="nav-ico">I</span>Profil</button>
  <button class="nav-btn" onclick="showPage('Quests',this)"><span class="nav-ico">Q</span>Quêtes</button>
  <button class="nav-btn" onclick="showPage('Clan',this)"><span class="nav-ico">C</span>Clan</button>
  <button class="nav-btn" onclick="showPage('Leaderboard',this)"><span class="nav-ico">R</span>Rang</button>
  <button class="nav-btn" onclick="showPage('Log',this)"><span class="nav-ico">L</span>Log</button>
</nav>

<script>
const RANKS=[
  {id:'e',label:'E',title:'Débutant',minLvl:1,cls:'rank-e'},
  {id:'d',label:'D',title:'Apprenti',minLvl:5,cls:'rank-d'},
  {id:'c',label:'C',title:'Chasseur',minLvl:10,cls:'rank-c'},
  {id:'b',label:'B',title:'Vétéran',minLvl:18,cls:'rank-b'},
  {id:'a',label:'A',title:'Élite',minLvl:28,cls:'rank-a'},
  {id:'s',label:'S',title:'Monarque',minLvl:40,cls:'rank-s'},
  {id:'ss',label:'SS',title:'Souverain',minLvl:55,cls:'rank-ss'},
  {id:'sss',label:'SSS',title:'Légende',minLvl:75,cls:'rank-sss'},
];

const ABILITIES=[
  {id:'str',name:'Force',cls:'ico-str',rCls:'str-r'},
  {id:'end',name:'Endurance',cls:'ico-end',rCls:'end-r'},
  {id:'agi',name:'Agilité',cls:'ico-agi',rCls:'agi-r'},
  {id:'vit',name:'Vitalité',cls:'ico-vit',rCls:'vit-r'},
  {id:'men',name:'Mental',cls:'ico-men',rCls:'men-r'},
];

const AB_COLORS={str:'var(--red)',end:'var(--green)',agi:'var(--gold)',vit:'#ec4899',men:'var(--purple)'};

// ─── QUESTS WITH PREDEFINED STATS ───
const QUEST_POOL={
  daily:[
    {title:'50 Pompes',desc:'Complète 50 pompes.',target:50,unit:'reps',xp:40,rewards:{str:1},icon:'STR'},
    {title:'100 Pompes',desc:'Complète 100 pompes.',target:100,unit:'reps',xp:70,rewards:{str:2},icon:'STR'},
    {title:'Course 3km',desc:'Cours 3 kilomètres.',target:3,unit:'km',xp:50,rewards:{end:1,agi:1},icon:'AGI'},
    {title:'Course 5km',desc:'Cours 5 kilomètres.',target:5,unit:'km',xp:80,rewards:{end:2,agi:1},icon:'END'},
    {title:'50 Squats',desc:'Fais 50 squats.',target:50,unit:'reps',xp:35,rewards:{str:1,end:1},icon:'STR'},
    {title:'100 Squats',desc:'Fais 100 squats.',target:100,unit:'reps',xp:60,rewards:{str:2,end:1},icon:'STR'},
    {title:'Planche 3 min',desc:'Tiens la planche 3 minutes.',target:3,unit:'min',xp:45,rewards:{end:1,men:1},icon:'END'},
    {title:'Planche 5 min',desc:'Tiens la planche 5 minutes.',target:5,unit:'min',xp:70,rewards:{end:2,men:1},icon:'MEN'},
    {title:'Étirements 15 min',desc:'15 minutes d\'étirements.',target:15,unit:'min',xp:30,rewards:{agi:2},icon:'AGI'},
    {title:'30 Burpees',desc:'Fais 30 burpees.',target:30,unit:'reps',xp:55,rewards:{str:1,end:1,agi:1},icon:'STR'},
    {title:'50 Burpees',desc:'Fais 50 burpees.',target:50,unit:'reps',xp:80,rewards:{str:2,end:1,agi:1},icon:'END'},
    {title:'Corde à sauter 10 min',desc:'10 min de corde à sauter.',target:10,unit:'min',xp:45,rewards:{agi:2,end:1},icon:'AGI'},
    {title:'100 Abdos',desc:'Fais 100 crunchs.',target:100,unit:'reps',xp:40,rewards:{str:1,vit:1},icon:'VIT'},
    {title:'50 Dips',desc:'Fais 50 dips.',target:50,unit:'reps',xp:50,rewards:{str:2},icon:'STR'},
    {title:'Marche rapide 5km',desc:'Marche 5 km à rythme soutenu.',target:5,unit:'km',xp:30,rewards:{end:1,vit:1},icon:'VIT'},
    {title:'Méditation 10 min',desc:'10 minutes de méditation.',target:10,unit:'min',xp:35,rewards:{men:2},icon:'MEN'},
    {title:'Sprint intervals',desc:'6 sprints de 100m.',target:6,unit:'reps',xp:60,rewards:{agi:2,str:1},icon:'AGI'},
  ],
  weekly:[
    {title:'Course 25km',desc:'Accumule 25km de course cette semaine.',target:25,unit:'km',xp:300,rewards:{end:3,agi:2},icon:'END'},
    {title:'500 Pompes',desc:'500 pompes sur la semaine.',target:500,unit:'reps',xp:280,rewards:{str:4,end:1},icon:'STR'},
    {title:'Guerrier de fer',desc:'1000 reps combinées (pompes + squats).',target:1000,unit:'reps',xp:400,rewards:{str:3,end:3},icon:'STR'},
    {title:'Méditation profonde',desc:'7 sessions de méditation.',target:7,unit:'sessions',xp:250,rewards:{men:4,vit:1},icon:'MEN'},
    {title:'Cardio Master',desc:'90 min de cardio intense.',target:90,unit:'min',xp:320,rewards:{end:3,vit:2},icon:'VIT'},
    {title:'Flexibilité totale',desc:'60 min d\'étirements.',target:60,unit:'min',xp:200,rewards:{agi:3,vit:2},icon:'AGI'},
  ],
  boss:[
    {title:'BOSS: Épreuve de fer',desc:'200 pompes + 200 squats + 10km en un jour.',target:1,unit:'completion',xp:800,rewards:{str:5,end:3,agi:2},icon:'S'},
    {title:'BOSS: Marche de l\'ombre',desc:'Cours 15km sans pause.',target:1,unit:'completion',xp:1000,rewards:{end:5,agi:3,men:2},icon:'S'},
    {title:'BOSS: Foudre divine',desc:'100 burpees + 5km + 100 abdos.',target:1,unit:'completion',xp:900,rewards:{str:3,end:3,agi:2,vit:2},icon:'S'},
    {title:'BOSS: Baptême de sang',desc:'300 pompes + 300 squats en une session.',target:1,unit:'completion',xp:1100,rewards:{str:6,end:4},icon:'SS'},
    {title:'BOSS: Épreuve du Titan',desc:'10 min de planche + 200 burpees.',target:1,unit:'completion',xp:1300,rewards:{str:4,end:4,men:3},icon:'SS'},
  ],
};

const CLANS=[
  {id:'shadow',name:'Shadow Monarchs',motto:'"Arise from the darkness."',cls:'shadow',members:['ShadowKing','NightBlade','DarkPulse','VoidWalker'],power:12400},
  {id:'flame',name:'Flame Legion',motto:'"Burn brighter than the sun."',cls:'flame',members:['FireLord','BlazeRunner','EmberFist','AshStorm'],power:11800},
  {id:'frost',name:'Frost Hunters',motto:'"Cold as steel, sharp as ice."',cls:'frost',members:['IceBreaker','FrostBite','ColdStrike','SnowFang'],power:10200},
  {id:'void',name:'Void Reapers',motto:'"Beyond the abyss lies power."',cls:'void',members:['VoidMaster','AbyssWalk','NullBlade','PhantomX'],power:9800},
];

const FAKE_PLAYERS=[
  {name:'ShadowKing',clan:'Shadow Monarchs',lvl:67,xp:48200,rank:'ss'},
  {name:'FireLord',clan:'Flame Legion',lvl:58,xp:39100,rank:'s'},
  {name:'IceBreaker',clan:'Frost Hunters',lvl:52,xp:34500,rank:'s'},
  {name:'NightBlade',clan:'Shadow Monarchs',lvl:45,xp:28700,rank:'a'},
  {name:'BlazeRunner',clan:'Flame Legion',lvl:41,xp:25300,rank:'a'},
  {name:'VoidMaster',clan:'Void Reapers',lvl:38,xp:22100,rank:'b'},
  {name:'FrostBite',clan:'Frost Hunters',lvl:33,xp:18400,rank:'b'},
  {name:'DarkPulse',clan:'Shadow Monarchs',lvl:29,xp:15200,rank:'a'},
  {name:'EmberFist',clan:'Flame Legion',lvl:24,xp:11800,rank:'b'},
  {name:'ColdStrike',clan:'Frost Hunters',lvl:19,xp:8600,rank:'c'},
];

const KEY='arise-v3';
let state=null;

function defaultState(){return{name:'',level:1,xp:0,totalXp:0,stats:{str:5,end:5,agi:5,vit:5,men:5},questsCompleted:0,workoutsTotal:0,streak:0,clanId:null,activeQuests:[],log:[],qc:0}}
function load(){try{state=JSON.parse(localStorage.getItem(KEY))}catch(e){}if(!state)state=defaultState()}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function xpFor(l){return Math.floor(80*Math.pow(l,1.4))}
function getRank(l){let r=RANKS[0];for(const k of RANKS)if(l>=k.minLvl)r=k;return r}

function addXp(n,src){
  const oL=state.level,oR=getRank(oL);
  state.xp+=n;state.totalXp+=n;
  while(state.xp>=xpFor(state.level)){state.xp-=xpFor(state.level);state.level++}
  if(state.level>oL)showLevelUp(state.level);
  const nR=getRank(state.level);
  if(nR.id!==oR.id)setTimeout(()=>showRankUp(nR),2500);
  addLog('xp','+'+n+' XP — '+src);save();
}

function addLog(t,x){state.log.unshift({type:t,text:x,time:Date.now()});if(state.log.length>50)state.log.pop()}

function genQuest(type){
  const pool=QUEST_POOL[type];
  const t=pool[Math.floor(Math.random()*pool.length)];
  state.qc++;
  return{id:type+'_'+state.qc+'_'+Date.now().toString(36),title:t.title,desc:t.desc,target:t.target,unit:t.unit,xp:Math.round(t.xp*(1+state.level*.04)),rewards:{...t.rewards},type,icon:t.icon,progress:0,completed:false};
}

function ensureQuests(){
  if(!state.activeQuests)state.activeQuests=[];
  const ac=t=>state.activeQuests.filter(q=>!q.completed&&q.type===t).length;
  while(ac('daily')<Math.min(5,3+Math.floor(state.level/10)))state.activeQuests.push(genQuest('daily'));
  while(ac('weekly')<2)state.activeQuests.push(genQuest('weekly'));
  while(ac('boss')<1)state.activeQuests.push(genQuest('boss'));
  const done=state.activeQuests.filter(q=>q.completed);
  if(done.length>5)state.activeQuests=state.activeQuests.filter(q=>!q.completed||done.indexOf(q)>=done.length-5);
  save();
}

function systemNotif(m){const e=document.getElementById('systemNotif');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),3000)}
function showLevelUp(l){document.getElementById('lvlUpNum').textContent=l;const o=document.getElementById('levelUpOverlay');o.classList.add('show');setTimeout(()=>o.classList.remove('show'),2200)}
function showRankUp(r){const e=document.getElementById('rankUpLetter');e.textContent=r.label;e.className='rank-up-letter '+r.cls;const o=document.getElementById('rankUpOverlay');o.classList.add('show');systemNotif('RANK UP > '+r.label+' — '+r.title);setTimeout(()=>o.classList.remove('show'),3000)}

function checkSetup(){if(!state.name){document.getElementById('setupModal').classList.add('open');setTimeout(()=>document.getElementById('setupName').focus(),200)}}
function finishSetup(){const n=document.getElementById('setupName').value.trim();if(!n)return;state.name=n;state.clanId=CLANS[Math.floor(Math.random()*CLANS.length)].id;addLog('rank','Éveil du Hunter. Rang E.');ensureQuests();save();document.getElementById('setupModal').classList.remove('open');systemNotif('ARISE — Bienvenue, '+n);renderAll()}

function showPage(n,b){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page'+n).classList.add('active');document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));if(b)b.classList.add('active');renderAll()}

function rewardTags(rewards){
  return Object.entries(rewards).map(([k,v])=>{
    const a=ABILITIES.find(x=>x.id===k);
    return`<span class="quest-reward ${a?.rCls||''}">${a?'+'+v+' '+a.name:''}</span>`;
  }).join('');
}

function renderAll(){
  // Dashboard
  const rk=getRank(state.level),xpN=xpFor(state.level),pct=Math.min(100,Math.round(state.xp/xpN*100));
  const abH=ABILITIES.map(a=>{const v=state.stats[a.id]||0;return`<div class="ability-row"><span class="ico ${a.cls}">${a.id.charAt(0).toUpperCase()}</span><span class="ability-name">${a.name}</span><div class="ability-track"><div class="ability-fill" style="width:${v}%;background:${AB_COLORS[a.id]}"></div></div><span class="ability-val" style="color:${AB_COLORS[a.id]}">${v}</span></div>`}).join('');
  document.getElementById('pageDashboard').innerHTML=`
    <div class="profile-header"><span class="profile-rank-badge ${rk.cls}">${rk.label}</span><div class="profile-name-row"><div class="profile-avatar">${(state.name||'H').charAt(0).toUpperCase()}</div><div><div class="profile-name">${state.name||'Hunter'}</div><div class="profile-title">${rk.title} // Rang ${rk.label}</div></div></div><div class="profile-rank-line"><span class="rank-label ${rk.cls}">RANG ${rk.label}</span><span class="profile-level">LVL ${state.level}</span></div><div class="xp-bar-wrap"><div class="xp-label"><span>EXP</span><span>${state.xp} / ${xpN}</span></div><div class="xp-track"><div class="xp-fill" style="width:${pct}%"></div></div></div></div>
    <div class="stats-grid"><div class="stat-card"><div class="stat-value">${state.level}</div><div class="stat-label">Niveau</div></div><div class="stat-card"><div class="stat-value">${state.totalXp.toLocaleString()}</div><div class="stat-label">XP Total</div></div><div class="stat-card"><div class="stat-value">${state.questsCompleted}</div><div class="stat-label">Quêtes</div></div><div class="stat-card"><div class="stat-value">${state.workoutsTotal}</div><div class="stat-label">Workouts</div></div><div class="stat-card"><div class="stat-value">${state.streak}</div><div class="stat-label">Streak</div></div><div class="stat-card"><div class="stat-value">${rk.label}</div><div class="stat-label">Rang</div></div></div>
    <div class="abilities"><div class="abilities-title">Capacités</div>${abH}</div>`;

  // Quests
  ensureQuests();
  const tColors={daily:'var(--cyan)',weekly:'var(--purple)',boss:'var(--red)'};
  const tLabels={daily:'QUOTIDIENNE',weekly:'HEBDOMADAIRE',boss:'BOSS RAID'};
  const active=state.activeQuests.filter(q=>!q.completed);
  const done=state.activeQuests.filter(q=>q.completed).slice(-3);

  function qH(q){
    const p=Math.min(100,Math.round(q.progress/q.target*100));
    const ready=q.progress>=q.target&&!q.completed;
    let inc='+1';if(q.unit==='reps')inc='+10';else if(q.unit==='km')inc='+1 km';else if(q.unit==='min')inc='+1 min';
    let acts='';
    if(!q.completed){
      if(ready)acts=`<div class="quest-actions"><button class="quest-btn complete-btn" onclick="completeQuest('${q.id}')">VALIDER</button></div>`;
      else acts=`<div class="quest-actions"><button class="quest-btn" onclick="progressQuest('${q.id}')">${inc} Progression</button></div>`;
    }
    return`<div class="quest-card ${q.type} ${q.completed?'completed':''} ${ready?'quest-ready':''}">
      ${q.completed?'<span class="quest-done-tag">COMPLETE</span>':''}
      <div class="quest-type" style="color:${tColors[q.type]}">${tLabels[q.type]}</div>
      <div class="quest-title">${q.title}</div>
      <div class="quest-desc">${q.desc}</div>
      <div class="quest-rewards"><span class="quest-reward xp-r">+${q.xp} XP</span>${rewardTags(q.rewards)}</div>
      <div class="quest-progress"><div class="quest-prog-track"><div class="quest-prog-fill" style="width:${p}%"></div></div><span class="quest-prog-text">${q.progress}/${q.target}</span></div>
      ${acts}
    </div>`;
  }

  document.getElementById('pageQuests').innerHTML=`
    <div class="section-head"><h2>Quêtes actives</h2><div class="line"></div></div>
    <p style="font-size:11px;color:var(--text-dim);margin-bottom:14px;">Nouvelles quêtes générées automatiquement après complétion. Les récompenses de stats sont prédéfinies.</p>
    ${active.map(q=>qH(q)).join('')}
    ${done.length?`<div class="section-head" style="margin-top:24px"><h2>Complétées</h2><div class="line"></div></div>${done.map(q=>qH(q)).join('')}`:''}`;

  // Clan
  const mc=CLANS.find(c=>c.id===state.clanId);
  if(mc){
    const mH=mc.members.map((m,i)=>{const f=FAKE_PLAYERS.find(x=>x.name===m);return`<div class="clan-member"><div class="clan-member-avatar">${m.charAt(0)}</div><div class="clan-member-info"><div class="clan-member-name">${m}</div><div class="clan-member-role">${i===0?'MAITRE':i===1?'OFFICIER':'MEMBRE'}</div></div><span class="clan-member-rank rank-${f?.rank||'e'}">${(f?.rank||'E').toUpperCase()}</span></div>`}).join('');
    document.getElementById('pageClan').innerHTML=`
      <div class="section-head"><h2>Clan</h2><div class="line"></div></div>
      <div class="clan-banner ${mc.cls}"><div class="clan-name">${mc.name}</div><div class="clan-motto">${mc.motto}</div><div class="clan-stats"><div><div class="clan-stat-val">${mc.members.length+1}</div><div class="clan-stat-label">Membres</div></div><div><div class="clan-stat-val">${mc.power+state.totalXp}</div><div class="clan-stat-label">Puissance</div></div><div><div class="clan-stat-val">#${CLANS.indexOf(mc)+1}</div><div class="clan-stat-label">Rang</div></div></div></div>
      <div class="section-head" style="margin-top:16px"><h2>Membres</h2><div class="line"></div></div>
      <div class="clan-member"><div class="clan-member-avatar" style="color:var(--cyan)">${(state.name||'H').charAt(0)}</div><div class="clan-member-info"><div class="clan-member-name" style="color:var(--cyan)">${state.name} (Toi)</div><div class="clan-member-role">MEMBRE</div></div><span class="clan-member-rank ${getRank(state.level).cls}">${getRank(state.level).label}</span></div>${mH}`;
  }

  // Leaderboard
  const me={name:state.name||'Hunter',clan:CLANS.find(c=>c.id===state.clanId)?.name||'—',lvl:state.level,xp:state.totalXp,rank:getRank(state.level).id,isMe:true};
  const all=[...FAKE_PLAYERS,me].sort((a,b)=>b.xp-a.xp);
  document.getElementById('pageLeaderboard').innerHTML=`<div class="section-head"><h2>Classement</h2><div class="line"></div></div>${all.map((p,i)=>{const tc=i===0?'top1':i===1?'top2':i===2?'top3':'';return`<div class="lb-entry ${tc} ${p.isMe?'you':''}"><span class="lb-pos">${i===0?'I':'#'+(i+1)}</span><div class="lb-avatar">${(p.name||'?').charAt(0)}</div><div class="lb-info"><div class="lb-name">${p.name}${p.isMe?' (Toi)':''}</div><div class="lb-clan">${p.clan||'—'}</div></div><span class="lb-rank rank-${p.rank||'e'}">${(p.rank||'E').toUpperCase()}</span><span class="lb-score">${(p.xp||0).toLocaleString()}</span></div>`}).join('')}`;

  // Log
  const lH=state.log.map(l=>{const d=new Date(l.time);return`<div class="log-entry ${l.type}"><span class="time">${d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span> ${l.text}</div>`}).join('')||'<p style="color:var(--text-dim);text-align:center;margin-top:40px;">Aucune activité.</p>';
  document.getElementById('pageLog').innerHTML=`<div class="section-head"><h2>Journal</h2><div class="line"></div></div>${lH}`;
}

function progressQuest(qid){
  const q=state.activeQuests.find(x=>x.id===qid);if(!q||q.completed)return;
  let inc=1;if(q.unit==='reps')inc=10;
  q.progress=Math.min(q.target,q.progress+inc);
  if(q.progress>=q.target){addLog('xp','Quête "'+q.title+'" prête !');systemNotif('QUÊTE PRÊTE — '+q.title)}
  else addLog('xp','Progression: '+q.title+' ('+q.progress+'/'+q.target+')');
  save();renderAll();
}

function completeQuest(qid){
  const q=state.activeQuests.find(x=>x.id===qid);if(!q||q.completed)return;
  q.completed=true;state.questsCompleted++;state.workoutsTotal++;
  const parts=[];
  Object.entries(q.rewards).forEach(([k,v])=>{
    if(state.stats[k]!==undefined){state.stats[k]=Math.min(99,state.stats[k]+v);const a=ABILITIES.find(x=>x.id===k);parts.push('+'+v+' '+a.name)}
  });
  addXp(q.xp,q.title);
  addLog('quest','"'+q.title+'" terminée ! +'+q.xp+' XP, '+parts.join(', '));
  systemNotif('QUÊTE COMPLÉTÉE — '+parts.join(', '));
  setTimeout(()=>{ensureQuests();systemNotif('NOUVELLE QUÊTE DISPONIBLE');renderAll()},1500);
  save();renderAll();
}

// Particles
(function(){const c=document.getElementById('particles');for(let i=0;i<50;i++){const p=document.createElement('div');p.className='particle';const s=1+Math.random()*3,isB=Math.random()>.5;p.style.cssText=`left:${Math.random()*100}%;bottom:${Math.random()*20-10}%;width:${s}px;height:${s}px;background:${isB?'var(--blue)':'var(--purple)'};--dur:${4+Math.random()*8}s;--op:${.1+Math.random()*.3};--drift:${60+Math.random()*140}px;animation-delay:${Math.random()*6}s;box-shadow:0 0 ${s*3}px ${isB?'var(--blue-glow)':'var(--purple-glow)'}`;c.appendChild(p)}})();

load();checkSetup();if(state.name){ensureQuests();renderAll()}
</script>
</body>
</html>
